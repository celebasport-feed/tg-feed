<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спортивный маркетолог 🏟️ — Веб-архив Telegram-канала</title>
  <meta name="description" content="Крупнейший канал про маркетинг в спорте. Читайте посты @celebasport в браузере.">
  <link rel="canonical" href="https://celebasport-feed.github.io/tg-feed/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Спортивный маркетолог 🏟️ — Telegram Web Feed">
  <meta property="og:description" content="Крупнейший канал про маркетинг в спорте. Кейсы, аналитика, тренды.">
  <meta property="og:url" content="https://celebasport-feed.github.io/tg-feed/">
  <meta property="og:locale" content="ru_RU">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Flex:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-top">
        <div class="header-channel">
          <img id="channelAvatar" class="channel-avatar" src="logo-celeba.png" alt="" onerror="this.style.display='none'">
          <div class="channel-meta">
            <h1 class="channel-name">Спортивный маркетолог 🏟️</h1>
            <span class="channel-handle">@celebasport · <span id="subscriberCount">…</span></span>
          </div>
        </div>
        <a class="btn-tg" href="https://t.me/celebasport" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.53 8.16l-1.83 8.63c-.14.62-.5.77-.99.48l-2.75-2.03-1.33 1.28c-.15.15-.27.27-.55.27l.2-2.8 5.1-4.6c.22-.2-.05-.3-.34-.13L8.4 13.4l-2.7-.84c-.59-.18-.6-.59.12-.87l10.56-4.07c.49-.18.92.12.76.87l-.01-.33z"/></svg>
          <span class="btn-tg-label">Telegram</span>
        </a>
      </div>
      <p class="channel-desc">Крупнейший канал про маркетинг в спорте. Победитель премий «Спортс» и Marspo. Авторы: основатель <a href="https://celeba-sport.ru" target="_blank">celeba-sport.ru</a> + топы индустрии.</p>
    </header>

    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" class="search-field" placeholder="Поиск по постам…" autocomplete="off">
      <button id="searchClear" class="search-clear" style="display:none" aria-label="Очистить">✕</button>
    </div>
    <p id="searchStatus" class="search-status"></p>

    <main id="feed" class="feed"></main>
    <div id="scrollLoader" class="scroll-loader" style="display:none"><div class="loader-dots"><span></span><span></span><span></span></div></div>
    <div id="emptyState" class="empty-state" style="display:none"><div class="empty-icon">🔍</div><p>Ничего не найдено</p></div>

    <footer class="app-footer">
      <p>Веб-архив <a href="https://t.me/celebasport" target="_blank">@celebasport</a></p>
      <p class="footer-sub">Обновляется автоматически каждые 3 часа</p>
    </footer>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose" aria-label="Закрыть"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Назад">‹</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" id="lbNext" aria-label="Вперёд">›</button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
  <div class="toast" id="toast">Ссылка скопирована</div>
  <script src="app.js"></script>
</body>
</html>
